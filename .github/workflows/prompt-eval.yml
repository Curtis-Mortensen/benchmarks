name: 'LLM Prompt Evaluation'

on:
  pull_request:
    paths:
      - 'prompts/**'
      - 'promptfooconfig.yaml'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for the action to post a comment on your PR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run promptfoo evaluation
        uses: promptfoo/promptfoo-action@v1
        env:
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
        with:
          # Required: Pass secrets for authentication
          github-token: ${{ secrets.GITHUB_TOKEN }}
          huggingface-api-key: ${{ secrets.HF_TOKEN }}
          
          # Tell the action where to look
          config: 'promptfooconfig.yaml'
